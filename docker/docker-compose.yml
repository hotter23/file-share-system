version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: file-share-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: file_share
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - file-share-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: file-share-redis
    ports:
      - "6379:6379"
    networks:
      - file-share-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: ../backend
      dockerfile: Dockerfile.gateway
    container_name: file-share-gateway
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - file-share-network

  user-service:
    build:
      context: ../backend
      dockerfile: Dockerfile.user
    container_name: file-share-user
    ports:
      - "8081:8081"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: root123
      MYSQL_DATABASE: file_share
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - file-share-network

  file-service:
    build:
      context: ../backend
      dockerfile: Dockerfile.file
    container_name: file-share-file
    ports:
      - "8082:8082"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: root123
      MYSQL_DATABASE: file_share
      COS_ENABLED: "false"
      COS_SECRET_ID: ${COS_SECRET_ID:}
      COS_SECRET_KEY: ${COS_SECRET_KEY:}
      COS_BUCKET: ${COS_BUCKET:file-share-bucket}
      COS_REGION: ${COS_REGION:ap-guangzhou}
    volumes:
      - /tmp/file-share:/tmp/file-share
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - file-share-network

  share-service:
    build:
      context: ../backend
      dockerfile: Dockerfile.share
    container_name: file-share-share
    ports:
      - "8083:8083"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: root123
      MYSQL_DATABASE: file_share
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - file-share-network

  nginx:
    image: nginx:alpine
    container_name: file-share-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - gateway
    networks:
      - file-share-network

volumes:
  mysql_data:

networks:
  file-share-network:
    driver: bridge
